name: Daily Statistics Aggregator

on:
  schedule:
    # Esegue lo script ogni giorno alle 00:30 UTC (dopo la mezzanotte)
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "stats-aggregation"
  cancel-in-progress: false

jobs:
  aggregate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter requests

      - name: Run Daily Stats Script
        run: python generate_daily_stats.py
        env:
          STATS_USER: ${{ secrets.STATS_USER }}
          STATS_PASSWORD: ${{ secrets.STATS_PASSWORD }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/stats_history.json
          if git diff --cached --quiet; then
            echo "Nessuna variazione da committare per stats_history.json"
          else
            git commit -m "stats: aggiornato storico visite giornaliere [skip ci]"
            git push
          fi
