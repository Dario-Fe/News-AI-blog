name: Build and Deploy Site

on:
  # Runs on pushes targeting the default branch (for changes to the site itself)
  push:
    branches: ["main"]
    paths-ignore:
      - 'public/stats_history.json'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Allows this workflow to be triggered by a remote repository
  repository_dispatch:
    types: [update-articles]

# Sets permissions of the GITHUB_TOKEN to allow deployment
permissions:
  contents: read
  # pages: write      # Disattivato per sospensione GitHub Pages
  # id-token: write   # Disattivato per sospensione GitHub Pages

# Allow only one concurrent deployment
concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # environment:
    #   name: github-pages
    #   url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Or your desired version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node.js dependencies
        run: npm install

      - name: Install locales
        run: |
          sudo apt-get update
          sudo apt-get install -y language-pack-it language-pack-es language-pack-fr language-pack-de
          sudo locale-gen it_IT.UTF-8 en_US.UTF-8 es_ES.UTF-8 fr_FR.UTF-8 de_DE.UTF-8

      - name: Cache dist directory
        uses: actions/cache@v4
        with:
          path: dist
          key: ${{ runner.os }}-dist-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-dist-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the site
        run: ./build.sh

      # - name: Upload artifact
      #   uses: actions/upload-pages-artifact@v3
      #   with:
      #     path: './dist'

      # - name: Deploy to GitHub Pages
      #   id: deployment
      #   uses: actions/deploy-pages@v4

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=dist --prod --skip-functions-cache
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
