<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <meta name="description" content="{{meta_description}}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{og_url}}">
    <meta property="og:title" content="{{page_title}}">
    <meta property="og:description" content="{{meta_description}}">
    <meta property="og:image" content="{{og_image}}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{og_url}}">
    <meta property="twitter:title" content="{{page_title}}">
    <meta property="twitter:description" content="{{meta_description}}">
    <meta property="twitter:image" content="{{og_image}}">

    <link rel="icon" href="{{favicon_ico_path}}" sizes="any">
    <link rel="icon" href="{{favicon_png_path}}" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Critical CSS for fast initial paint -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f0f2f5;
            color: #1c1e21;
        }
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #dddfe2;
            position: relative;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            color: #000;
        }
        main {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
    <!-- Asynchronously load the full stylesheet -->
    <link rel="preload" href="{{css_path}}" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="{{css_path}}"></noscript>
</head>
<body>
    <header>
        <div class="header-top-row">
            <div id="header-social-icon-container">
                <a href="https://www.facebook.com/profile.php?id=61581021006430" target="_blank" rel="noopener noreferrer" class="header-social-link" title="Facebook"></a>
                <a href="https://www.youtube.com/@AITalk-AI" target="_blank" rel="noopener noreferrer" class="header-social-link" title="YouTube"></a>
                <a href="https://open.spotify.com/show/3rxO5H8pkfh70EYiRNZkej?si=b2a69efe6d5543ae" target="_blank" rel="noopener noreferrer" class="header-social-link" title="Spotify"></a>
            </div>
            <div id="language-selector-container">
                <div id="search-container">
                    <button id="search-toggle" class="search-toggle" title="{{search_label}}"></button>
                    <div id="search-input-wrapper" class="search-input-wrapper">
                        <input type="text" id="search-input" placeholder="{{search_placeholder}}" aria-label="{{search_label}}">
                        <div id="search-results" class="search-results"></div>
                    </div>
                </div>
                <a href="{{newsletter_link}}" class="subscribe-link">{{subscribe_link_text}}</a>
                <span class="separator"></span>
                {{language_dropdown_html}}
            </div>
        </div>
        <a href="{{home_link}}">
          <picture>
            <source srcset="{{logo_path_webp}}" type="image/webp">
            <img src="{{logo_path_png}}" alt="Notizie IA Logo" style="max-width: 100%; height: auto;">
          </picture>
        </a>
        <h1 class="visually-hidden">AITalk</h1>
        <p id="subtitle">{{subtitle}}</p>
    </header>
    <main>
        {{content}}
        <div class="pagination-controls">
            {{pagination_controls}}
        </div>
    </main>
    <footer>
        <p>{{footer_curated_by}} <a href="{{author_link}}">Dario Ferrero</a></p>
        <p>
            <a href="mailto:info@verbanianotizie.it">{{footer_contacts}}</a> |
            <a href="{{metodo_link}}">{{footer_editorial_method}}</a> |
            <a href="{{cookie_link}}">Cookie</a> |
            <a href="{{privacy_link}}">Privacy Policy</a>
        </p>
    </footer>
    <script>
      // This will be populated by the build script
      window.APP_CONFIG = {
        lang: '{{lang}}',
        viewMoreText: '{{view_more_text}}',
        placeholderImage: '{{placeholder_image_path}}',
        searchNoResultsText: '{{search_no_results}}'
      };
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- State Management ---
            let allArticles = [];
            let currentFilteredArticles = [];
            let currentPage = 0;
            let activeTag = 'all';

            let searchIndexLoaded = false;
            // --- DOM Elements ---
            const grid = document.getElementById('articles-grid');
            const viewMoreContainer = document.getElementById('view-more-container');
            const filterButtons = document.querySelectorAll('.tag-filter-button');
            const searchToggle = document.getElementById('search-toggle');
            const searchInputWrapper = document.getElementById('search-input-wrapper');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');

            // --- Core Functions ---
            /**
             * Loads the articles JSON index for search if not already loaded.
             */
            const ensureSearchIndexLoaded = async () => {
                if (searchIndexLoaded) return;
                try {
                    const depth = parseInt('{{depth}}' || '1');
                    const prefix = "../".repeat(depth - 1);
                    const response = await fetch(`${prefix}articles.json`);
                    if (!response.ok) throw new Error('Network response was not ok');
                    allArticles = await response.json();
                    searchIndexLoaded = true;
                } catch (error) {
                    console.error('Failed to load search index:', error);
                }
            };

            /**
             * Performs search and updates results dropdown.
             */
            const performSearch = (query) => {
                if (!query || query.length < 2) {
                    searchResults.style.display = 'none';
                    searchResults.innerHTML = '';
                    return;
                }

                const normalizedQuery = query.toLowerCase().trim();
                const currentLang = window.APP_CONFIG.lang;
                const filteredResults = allArticles.filter(article => {
                    if (article.lang && article.lang !== currentLang) return false;
                    return (article.title && article.title.toLowerCase().includes(normalizedQuery)) ||
                           (article.summary && article.summary.toLowerCase().includes(normalizedQuery)) ||
                           (article.tags && article.tags.some(tag => tag.toLowerCase().includes(normalizedQuery)));
                }).slice(0, 8);

                renderSearchResults(filteredResults);
            };

            /**
             * Renders results into the dropdown.
             */
            const renderSearchResults = (results) => {
                searchResults.innerHTML = '';
                if (results.length === 0) {
                    searchResults.innerHTML = `<div class="search-no-results">${window.APP_CONFIG.searchNoResultsText}</div>`;
                } else {
                    const depth = parseInt('{{depth}}' || '1');
                    const prefix = "../".repeat(depth - 1);
                    const assetPrefix = "../".repeat(depth);
                    results.forEach(article => {
                        const item = document.createElement('a');
                        item.href = prefix + article.path;
                        item.className = 'search-result-item';
                        
                        let imageHtml = '';
                        if (article.image_paths) {
                            imageHtml = `<img src="${assetPrefix}${article.image_paths.thumb_jpeg}" alt="">`;
                        }

                        item.innerHTML = `
                            ${imageHtml}
                            <div class="search-result-info">
                                <div class="search-result-title">${article.title}</div>
                                <div class="search-result-summary">${article.summary}</div>
                            </div>
                        `;
                        searchResults.appendChild(item);
                    });
                }
                searchResults.style.display = 'block';
            };


            /**
             * Renders a page of articles to the grid.
             * @param {Array} articlesToRender - The array of article objects to render.
             */
            const renderArticles = (articlesToRender) => {
                const lang = window.APP_CONFIG.lang;
                const localeMap = { 'it': 'it-IT', 'en': 'en-GB', 'es': 'es-ES', 'fr': 'fr-FR', 'de': 'de-DE' };
                const locale = localeMap[lang] || lang;

                articlesToRender.forEach(article => {
                    let dateHtml = '';
                    if (article.date) {
                        const date = new Date(article.date);
                        const options = { day: 'numeric', month: 'long', year: 'numeric' };
                        dateHtml = `<p class="article-card-date">${date.toLocaleDateString(locale, options)}</p>`;
                    }

                    let tagsHtml = '';
                    if (article.tags && article.tags.length > 0) {
                        tagsHtml = '<div class="article-card-tags">' + article.tags.map(tag => `<span class="tag">${tag}</span>`).join('') + '</div>';
                    }

                    const tagsDataAttr = article.tags ? article.tags.join(' ') : '';
                    
                    let imageHtml = '';
                    if (article.image_paths) {
                        imageHtml = `
                            <picture>
                                <source srcset="../${article.image_paths.thumb_webp}" type="image/webp">
                                <source srcset="../${article.image_paths.thumb_jpeg}" type="image/jpeg">
                                <img src="../${article.image_paths.thumb_jpeg}" alt="${article.title}" loading="lazy">
                            </picture>`;
                    } else {
                        imageHtml = `<img src="${window.APP_CONFIG.placeholderImage}" alt="${article.title}" loading="lazy">`;
                    }

                    const card = document.createElement('a');
                    card.href = article.path;
                    card.className = 'article-card';
                    card.setAttribute('data-tags', tagsDataAttr);
                    card.innerHTML = `
                        ${imageHtml}
                        <div class="article-card-content">
                            ${dateHtml}<h3>${article.title}</h3><p>${article.summary}</p>${tagsHtml}
                        </div>`;
                    grid.appendChild(card);
                });
            };

            /**
             * Updates the visibility of the "View More" button.
             */
            const updateViewMoreButton = () => {
                if (!viewMoreContainer) return;
                let nextStart;
                if (activeTag === 'all') {
                    // Page 0 has been rendered (the first featured post + first 15 standard posts: indices 0 to 15).
                    // Next pages render in increments of 15 standard posts starting at index 16.
                    nextStart = currentPage === 0 ? 0 : 16 + (currentPage - 1) * 15;
                } else {
                    // Tag filtered view doesn't have the popular sidebar / featured layout block.
                    // It uses standard pages of 15 articles.
                    nextStart = currentPage * 15;
                }
                const moreArticlesExist = nextStart < currentFilteredArticles.length;
                viewMoreContainer.style.display = moreArticlesExist ? 'flex' : 'none';
            };
            
            /**
             * Renders the next page of articles from the current filtered list.
             */
            const renderNextPage = () => {
                let start, end;
                if (activeTag === 'all') {
                    // Under 'all' view, page 0 corresponds to slicing index 1 to 16 from the main articles array
                    // (since article 0 is featured separately in the static html block).
                    // Wait, on initial static HTML load, the grid is ALREADY populated with articles 1 to 15 (indices 1 to 15).
                    // So when the user first clicks "Carica Altri Articoli" (which runs renderNextPage for currentPage=1),
                    // we want to load starting at index 16.
                    // Let's make sure currentPage starts at 1 if initial load already has 16 articles (1 featured + 15 in grid).
                    // Let's trace: applyFilter('all') will clear the grid, hide the featured row if tag is not 'all', and run renderNextPage.
                    // Wait! If applyFilter('all') runs, it clears the grid and we want to render the initial set:
                    // In applyFilter('all'), we WANT to render the first page of standard articles inside `#articles-grid`.
                    // The first page of standard articles inside the grid are indices 1 to 16.
                    // So, under activeTag === 'all':
                    // - page 0: indices 1 to 16 (15 articles)
                    // - page 1: indices 16 to 31 (15 articles)
                    // - page 2: indices 31 to 46 (15 articles)
                    // Wait, let's look at the math!
                    // If currentPage === 0: start = 1, end = 16.
                    // If currentPage === 1: start = 16, end = 31.
                    // If currentPage === 2: start = 31, end = 46.
                    // Let's generalize for activeTag === 'all':
                    // start = 1 + currentPage * 15
                    // end = start + 15
                    // Let's check this:
                    // For page 0: start = 1, end = 16. Perfect!
                    // For page 1: start = 16, end = 31. Perfect!
                    // For page 2: start = 31, end = 46. Perfect!
                    start = 1 + currentPage * 15;
                    end = start + 15;
                } else {
                    // Under tag filtered view:
                    // - page 0: indices 0 to 15 (15 articles)
                    // - page 1: indices 15 to 30 (15 articles)
                    // - page 2: indices 30 to 45 (15 articles)
                    // Generalizing for tag filtered view:
                    // start = currentPage * 15
                    // end = start + 15
                    start = currentPage * 15;
                    end = start + 15;
                }
                const articlesToRender = currentFilteredArticles.slice(start, end);
                
                renderArticles(articlesToRender);
                currentPage++;
                updateViewMoreButton();
            };

            /**
             * Applies a tag filter, clears the grid, and renders the first page of results.
             * @param {string} tag - The tag to filter by.
             */
            const applyFilter = (tag) => {
                activeTag = tag;
                currentPage = 0;
                
                // Update active button UI
                filterButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-tag') === tag);
                });

                // Show/hide home-featured-row based on tag filter
                const featuredRow = document.getElementById('home-featured-row');
                if (featuredRow) {
                    featuredRow.style.display = (tag === 'all') ? 'flex' : 'none';
                }

                // Get the new filtered list
                if (tag === 'all') {
                    currentFilteredArticles = [...allArticles];
                } else {
                    currentFilteredArticles = allArticles.filter(a => a.tags && a.tags.includes(tag));
                }

                // Render the new view
                grid.innerHTML = ''; // Clear the grid

                // If it is initial page load (where HTML is already statically pre-rendered with 1 featured + 15 grid articles),
                // we DO NOT want to re-render page 0, because it is already there. We just want to initialize state.
                // Wait, how do we distinguish initial load from subsequent applyFilter?
                // On initial load, grid already contains 15 child nodes. But initialize() calls applyFilter(initialTag).
                // If we clear grid in applyFilter, we lose the static html and need to render.
                // Let's check: if we just render it, it's very fast and ensures consistency between hash change and load!
                // So let's always render on applyFilter.
                renderNextPage(); // Render page 0 of the new list
            };

            /**
             * Initializes the entire application.
             */
            const initialize = async () => {

                // Search UI Handlers
                if (searchToggle) {
                    searchToggle.addEventListener('click', async () => {
                        const isOpen = searchInputWrapper.classList.contains('open');
                        if (!isOpen) {
                            await ensureSearchIndexLoaded();
                            searchInputWrapper.classList.add('open');
                            searchInput.focus();
                        } else {
                            searchInputWrapper.classList.remove('open');
                            searchResults.style.display = 'none';
                        }
                    });
                }

                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        performSearch(e.target.value);
                    });
                    
                    searchInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') {
                            searchInputWrapper.classList.remove('open');
                            searchResults.style.display = 'none';
                        }
                    });
                }

                document.addEventListener('click', (e) => {
                    const container = document.getElementById('search-container');
                    if (container && !container.contains(e.target)) {
                        if (searchInputWrapper) searchInputWrapper.classList.remove('open');
                        if (searchResults) searchResults.style.display = 'none';
                    }
                });

                // Setup UI listeners
                if (viewMoreContainer) {
                    const button = document.createElement('button');
                    button.id = 'view-more-button';
                    button.className = 'view-more-button';
                    button.textContent = window.APP_CONFIG.viewMoreText;
                    button.addEventListener('click', renderNextPage);
                    viewMoreContainer.innerHTML = '';
                    viewMoreContainer.appendChild(button);
                }

                filterButtons.forEach(button => {
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        const tag = button.getAttribute('data-tag');
                        window.location.hash = tag; // This will trigger the hashchange listener
                    });
                });
                
                window.addEventListener('hashchange', () => {
                    const tag = window.location.hash.substring(1) || 'all';
                    applyFilter(decodeURIComponent(tag));
                });

                // Fetch data and perform initial render
                try {
                    const response = await fetch('articles.json');
                    if (!response.ok) throw new Error('Network response was not ok');
                    allArticles = await response.json();
                    
                    // Trigger initial filter based on current URL hash
                    const initialTag = window.location.hash.substring(1) || 'all';

                    // To avoid flicker and preserve the static server-side rendered HTML content on first load,
                    // we can just load the state and only applyFilter dynamically if initialTag is NOT 'all'.
                    if (initialTag !== 'all') {
                        applyFilter(decodeURIComponent(initialTag));
                    } else {
                        // Just initialize states for 'all'
                        currentFilteredArticles = [...allArticles];
                        currentPage = 1; // 1 page (0) is already rendered statically
                        updateViewMoreButton();
                    }

                } catch (error) {
                    console.error('Failed to load articles:', error);
                    if (grid) grid.innerHTML = '<p>Error loading articles. Please try again later.</p>';
                }
            };

            initialize();
        });
    </script>

    <!-- AddToAny BEGIN -->
    <script>
    var a2a_config = a2a_config || {};
    a2a_config.icon_color = "#1877f2, #ffffff"; // Blue and white for icons
    </script>
    <script async src="https://static.addtoany.com/menu/page.js"></script>
    <!-- AddToAny END -->

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const podcastButton = document.getElementById('podcast-button');
            const mediaPlayerContainer = document.getElementById('media-player-container');

            const hidePlayer = () => {
                mediaPlayerContainer.style.display = 'none';
                mediaPlayerContainer.innerHTML = '';
            };

            if (podcastButton) {
                podcastButton.addEventListener('click', () => {
                    const isPodcastActive = mediaPlayerContainer.querySelector('#podcast-player');
                    if (isPodcastActive) {
                        hidePlayer();
                    } else {
                        const audioSrc = podcastButton.dataset.src;
                        mediaPlayerContainer.innerHTML = `<audio id="podcast-player" controls src="${audioSrc}" style="width: 100%;">Your browser does not support the audio element.</audio>`;
                        mediaPlayerContainer.style.display = 'block';
                    }
                });
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dropdown = document.querySelector('.language-dropdown');
            if (dropdown) {
                const toggle = dropdown.querySelector('.language-dropdown-toggle');
                toggle.addEventListener('click', () => {
                    dropdown.classList.toggle('open');
                });

                window.addEventListener('click', function(e) {
                    if (!dropdown.contains(e.target)) {
                        dropdown.classList.remove('open');
                    }
                });
            }
        });
    </script>
    <script>
        // Anonymous page view tracking. Respects "No Cookie" policy.
        // We only track on the production domain to respect privacy and avoid test/preview data.
        if (window.location.hostname === 'aitalk.it') {
            const data = { path: window.location.pathname };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            navigator.sendBeacon('/.netlify/functions/page-view', blob);
        }
    </script>
</body>
</html>
